<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Orders — Henry Sells</title>

    <link rel="stylesheet" href="../css/orders.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />

    <!-- Font Awesome -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"
      crossorigin="anonymous"
      defer
    ></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="icon" href="../../assets/img/favicon.ico" />
  </head>

  <body>
    <header class="admin-header orders-header">
      <div class="header-left">
        <h1>Orders</h1>
        <p class="subtitle">Customer-grouped orders</p>
      </div>

      <nav class="header-nav">
        <a href="./dashboard.html" class="nav-link">Back to Dashboard</a>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </nav>
    </header>

    <main class="orders-container">
      <!-- SEARCH BAR -->
      <section class="search-section" aria-label="Search orders">
        <label for="searchInput" class="sr-only">Search by order id</label>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input
            id="searchInput"
            type="text"
            placeholder="Search by Order ID (e.g. HNS-241101-… )"
          />
          <button id="clearSearch" class="clear-search" title="Clear">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </section>

      <section id="ordersGrid" class="orders-grid" aria-live="polite">
        <p class="loading-text">Loading orders...</p>
      </section>
    </main>

    <!-- DELETE CONFIRM MODAL -->
    <div
      id="confirmModal"
      class="modal"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-panel">
        <header class="modal-header">
          <h2>Delete Customer Order</h2>
          <button class="modal-close" id="modalCloseBtn" aria-label="Close">
            &times;
          </button>
        </header>

        <div class="modal-body">
          <p id="modalMsg">
            Are you sure you want to delete this customer's orders?
          </p>
        </div>

        <footer class="modal-footer">
          <button class="btn btn-ghost" id="modalCancel">Cancel</button>
          <button class="btn btn-danger" id="modalDelete">
            Delete Customer Order
          </button>
        </footer>
      </div>
    </div>

    <!-- PDF LOADER -->
    <div id="pdfLoader" class="pdf-loader" aria-hidden="true">
      <div class="pdf-loader-panel">
        <div class="spinner" aria-hidden="true"></div>
        <div class="pdf-msg">Preparing invoice PDF...</div>
      </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script type="module">
      import { auth, db } from "../../firebase/firebaseConfig.js";
      import {
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

      import {
        collection,
        onSnapshot,
        query,
        orderBy,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

      const ordersGrid = document.getElementById("ordersGrid");
      const searchInput = document.getElementById("searchInput");
      const clearSearchBtn = document.getElementById("clearSearch");

      const modal = document.getElementById("confirmModal");
      const modalMsg = document.getElementById("modalMsg");
      const modalCloseBtn = document.getElementById("modalCloseBtn");
      const modalCancel = document.getElementById("modalCancel");
      const modalDelete = document.getElementById("modalDelete");

      const pdfLoader = document.getElementById("pdfLoader");

      const newOrderSound = new Audio(
        "../../assets/sound/Slack - Knock brush.mp3"
      );

      let seenGroups = JSON.parse(localStorage.getItem("seenGroups") || "[]");

      function formatNaira(n) {
        return "₦" + Number(n || 0).toLocaleString("en-NG");
      }

      /* AUTH */
      onAuthStateChanged(auth, (user) => {
        if (!user) return (window.location.href = "../index.html");
        listenForOrders();
      });

      document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => (window.location.href = "../index.html"));
      };

      /* SNAPSHOT LISTENER */
      function listenForOrders() {
        const qOrders = query(
          collection(db, "orders"),
          orderBy("createdAt", "desc")
        );
        onSnapshot(qOrders, (snap) => {
          processOrdersSnapshot(snap);
        });
      }

      let customerGroups = [];
      let pendingDeleteCustomer = null; // for modal

      function processOrdersSnapshot(qsnap) {
        if (!qsnap || qsnap.empty) {
          ordersGrid.innerHTML = `<p class="no-orders">No orders yet.</p>`;
          customerGroups = [];
          return;
        }

        const grouped = {};

        qsnap.forEach((ds) => {
          const d = ds.data();
          d.id = ds.id;

          const key = d.referenceName || "Unknown Customer";

          if (!grouped[key]) {
            grouped[key] = {
              name: key,
              orders: [],
              products: [],
              latestDate: d.createdAt?.toDate() || new Date(0),
            };
          }

          grouped[key].orders.push(d);
          grouped[key].products.push(...(d.products || []));

          const dt = d.createdAt?.toDate();
          if (dt > grouped[key].latestDate) grouped[key].latestDate = dt;
        });

        customerGroups = Object.values(grouped).sort(
          (a, b) => b.latestDate - a.latestDate
        );

        renderOrders(customerGroups);
      }

      /* RENDER */
      function renderOrders(groups) {
        ordersGrid.innerHTML = "";

        if (!groups.length) {
          ordersGrid.innerHTML = `<p class="no-orders">No matching orders.</p>`;
          return;
        }

        groups.forEach((customer) => {
          const isNew = !seenGroups.includes(customer.name);

          if (isNew) {
            newOrderSound.currentTime = 0;
            newOrderSound.play().catch(() => {});
          }

          const card = document.createElement("article");
          card.className = "order-card";
          if (isNew) card.classList.add("highlight-new");

          const dateStr = customer.latestDate?.toLocaleString() || "Unknown";

          const totalNumeric = customer.products.reduce(
            (s, p) => s + (p.priceNumeric || 0),
            0
          );

          const rows = customer.products
            .map(
              (p) => `
        <div class="product-row">
          <span class="product-name">${escapeHtml(p.name)}</span>
          <span class="price-tag">
            <span class="currency">₦</span>
            <span class="amount">${Number(p.priceNumeric || 0).toLocaleString(
              "en-NG"
            )}</span>
          </span>
        </div>`
            )
            .join("");

          card.innerHTML = `
      <header class="order-head">
        <div>
          <p class="order-id">Customer: ${escapeHtml(customer.name)}</p>
          <p class="order-date">Last Order: ${escapeHtml(dateStr)}</p>
        </div>
        <p class="order-ref">${customer.products.length} items</p>
      </header>

      <section class="order-body">${rows}</section>

      <footer class="order-footer">
        <strong class="order-total">Total: ${formatNaira(totalNumeric)}</strong>

        <button class="seen-btn">Mark as seen</button>

        <div class="order-actions">
          <button class="pdf-btn" title="Export as Invoice PDF"><i class="fa-solid fa-file-invoice"></i></button>
          <button class="delete-btn" title="Delete Customer Order"><i class="fa-solid fa-trash"></i></button>
        </div>
      </footer>
    `;

          card.querySelector(".seen-btn").onclick = () => {
            if (!seenGroups.includes(customer.name)) {
              seenGroups.push(customer.name);
              localStorage.setItem("seenGroups", JSON.stringify(seenGroups));
            }
            card.classList.remove("highlight-new");
          };

          card.querySelector(".delete-btn").onclick = () => {
            openDeleteModal(customer);
          };

          card.querySelector(".pdf-btn").onclick = () =>
            exportCustomerInvoicePDF(customer);

          ordersGrid.appendChild(card);
        });
      }

      /* SEARCH */
      clearSearchBtn.onclick = () => {
        searchInput.value = "";
        searchInput.focus();
        renderOrders(customerGroups);
      };

      searchInput.oninput = () => {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) return renderOrders(customerGroups);

        const filtered = customerGroups
          .map((c) => ({
            ...c,
            orders: c.orders.filter((o) =>
              (o.orderId || "").toLowerCase().includes(q)
            ),
            products: c.products,
          }))
          .filter((c) => c.orders.length > 0);

        renderOrders(filtered);
      };

      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /* ---------------------------
         DELETE MODAL
         --------------------------- */
      function openDeleteModal(customer) {
        pendingDeleteCustomer = customer;
        modalMsg.textContent = `Delete ALL orders for "${customer.name}"? This action cannot be undone.`;
        modal.setAttribute("aria-hidden", "false");
        modal.classList.add("open");
        // focus the cancel button
        modalCancel.focus();
      }

      function closeModal() {
        pendingDeleteCustomer = null;
        modal.setAttribute("aria-hidden", "true");
        modal.classList.remove("open");
      }

      modalCloseBtn.onclick = closeModal;
      modalCancel.onclick = closeModal;

      modalDelete.onclick = async () => {
        if (!pendingDeleteCustomer) return closeModal();
        const customer = pendingDeleteCustomer;
        closeModal();
        try {
          // delete each order document for that customer
          for (const order of customer.orders) {
            await deleteDoc(doc(db, "orders", order.id));
          }
          // remove seen flag for that customer
          seenGroups = seenGroups.filter((n) => n !== customer.name);
          localStorage.setItem("seenGroups", JSON.stringify(seenGroups));
          alert("Customer orders deleted successfully.");
        } catch (err) {
          console.error("Delete error:", err);
          alert("Error deleting orders. See console for details.");
        }
      };

      /* ---------------------------
         PDF EXPORT (Invoice style using jsPDF)
         --------------------------- */
      async function exportCustomerInvoicePDF(customer) {
        try {
          // show loader
          showPdfLoader(true);

          const { jsPDF } = window.jspdf;

          const pdf = new jsPDF({ unit: "pt", format: "a4" });
          const pageWidth = pdf.internal.pageSize.getWidth();
          const margin = 40;
          let cursorY = 60;

          // Business info (top-left) and Invoice label (top-right)
          pdf.setFontSize(12);
          pdf.setFont("helvetica", "bold");
          pdf.text("HENRY SELLS", margin, cursorY);
          pdf.setFontSize(10);
          pdf.setFont("helvetica", "normal");
          pdf.text("Email: henrysells17@gmail.com", margin, cursorY + 18);
          pdf.text("Phone: +234 (0) 8160813334", margin, cursorY + 34);

          // Invoice header on right
          pdf.setFontSize(18);
          pdf.setFont("helvetica", "bold");
          const headerLabel = "INVOICE";
          pdf.text(
            headerLabel,
            pageWidth - margin - pdf.getTextWidth(headerLabel),
            cursorY
          );

          cursorY += 56;

          // customer + meta
          pdf.setDrawColor(200);
          pdf.setLineWidth(0.6);
          pdf.line(margin, cursorY, pageWidth - margin, cursorY);
          cursorY += 14;

          pdf.setFontSize(11);
          pdf.setFont("helvetica", "bold");
          pdf.text("Bill To:", margin, cursorY);
          pdf.setFont("helvetica", "normal");
          pdf.text(customer.name, margin + 58, cursorY);
          cursorY += 18;

          const lastOrderLabel = "Last Order:";
          const lastOrderStr = customer.latestDate
            ? customer.latestDate.toLocaleString()
            : "Unknown";
          pdf.text(lastOrderLabel, margin, cursorY);
          pdf.text(lastOrderStr, margin + 72, cursorY);

          cursorY += 24;

          // Table header
          pdf.setFont("helvetica", "bold");
          pdf.setFontSize(11);
          const colNameX = margin;
          const colQtyX = pageWidth - margin - 200;
          const colUnitX = pageWidth - margin - 110;
          const colAmountX = pageWidth - margin - 40;

          pdf.text("Description", colNameX, cursorY);
          pdf.text("Qty", colQtyX, cursorY);
          pdf.text("Unit", colUnitX, cursorY);
          pdf.text("Amount", colAmountX, cursorY, { align: "right" });

          cursorY += 8;
          pdf.setDrawColor(220);
          pdf.setLineWidth(0.5);
          pdf.line(margin, cursorY, pageWidth - margin, cursorY);
          cursorY += 14;

          // Products rows
          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(10);

          const rowHeight = 16;
          let subtotal = 0;
          const products = customer.products || [];

          for (let i = 0; i < products.length; i++) {
            const p = products[i];
            const name = p.name || "Item";
            const qty = p.qty || 1;
            const unit = p.unit || "";
            const amount = Number(p.priceNumeric || 0);
            const amountStr = formatNaira(amount);

            // page break check
            if (cursorY + rowHeight > pdf.internal.pageSize.getHeight() - 120) {
              pdf.addPage();
              cursorY = 60;
            }

            // description: wrap if long
            const splitName = pdf.splitTextToSize(name, colQtyX - colNameX - 8);
            pdf.text(splitName, colNameX, cursorY);

            // qty / unit / amount (aligned)
            pdf.text(String(qty), colQtyX, cursorY);
            pdf.text(String(unit), colUnitX, cursorY);
            pdf.text(amountStr, colAmountX, cursorY, { align: "right" });

            // if splitName had multiple lines, move cursor accordingly
            cursorY += rowHeight * Math.max(1, splitName.length);

            subtotal += amount * qty;
          }

          // totals block
          cursorY += 12;
          pdf.setLineWidth(0.5);
          pdf.setDrawColor(220);
          pdf.line(colUnitX - 20, cursorY, pageWidth - margin, cursorY);
          cursorY += 10;

          const tax = 0; // set if needed
          const total = subtotal + tax;

          pdf.setFont("helvetica", "bold");
          pdf.text("Subtotal:", colUnitX - 20, cursorY);
          pdf.text(formatNaira(subtotal), colAmountX, cursorY, {
            align: "right",
          });
          cursorY += 18;

          pdf.setFont("helvetica", "normal");
          pdf.text("Tax:", colUnitX - 20, cursorY);
          pdf.text(formatNaira(tax), colAmountX, cursorY, { align: "right" });
          cursorY += 18;

          pdf.setFont("helvetica", "bold");
          pdf.text("Total:", colUnitX - 20, cursorY);
          pdf.text(formatNaira(total), colAmountX, cursorY, { align: "right" });
          cursorY += 28;

          // Footer notes
          pdf.setFontSize(9);
          pdf.setFont("helvetica", "normal");
          pdf.text("Thank you for your order.", margin, cursorY);
          cursorY += 14;
          pdf.text("This is a computer-generated invoice.", margin, cursorY);

          // Save PDF
          const filename = `Invoice_${customer.name.replace(
            /\s+/g,
            "_"
          )}_${new Date()
            .toISOString()
            .slice(0, 19)
            .replace(/[:T]/g, "-")}.pdf`;
          pdf.save(filename);
        } catch (err) {
          console.error("PDF export failed:", err);
          alert("Failed to export PDF. See console for details.");
        } finally {
          showPdfLoader(false);
        }
      }

      function showPdfLoader(show) {
        if (show) {
          pdfLoader.setAttribute("aria-hidden", "false");
          pdfLoader.classList.add("visible");
        } else {
          pdfLoader.setAttribute("aria-hidden", "true");
          pdfLoader.classList.remove("visible");
        }
      }

      // Ask for notifications ONCE
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission().then((result) => {
          console.log("Notification permission:", result);
        });
      }

      // Register service worker (must not be imported as module)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("../orders-sw.js").then(() => {
          console.log("Service worker registered");
        });
      }
    </script>
  </body>
</html>
