<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css" />

    <!-- Icons -->
    <link rel="icon" href="../../assets/img/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../../assets/img/apple-touch-icon.png"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Righteous&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="admin-header">
      <div class="header-left">
        <h1>Henry Sells — Admin Review Page</h1>
        <p class="subtitle">Review management · Moderation · Insights</p>
      </div>

      <nav class="header-nav">
        <a href="./orders.html" class="nav-link">Orders</a>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </nav>
    </header>

    <main class="dashboard-container">
      <section class="review-section">
        <h2 class="section-title">Submitted Reviews</h2>

        <div class="reviews-grid" id="reviewsContainer">
        </div>
      </section>
    </main>

    <script type="module">
      import { auth, db } from "../firebase/firebaseConfig.js";
      import {
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
      import {
        collection,
        getDocs,
        deleteDoc,
        doc,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

      const reviewsContainer = document.getElementById("reviewsContainer");
      const logoutBtn = document.getElementById("logoutBtn");

      onAuthStateChanged(auth, (user) => {
        if (!user) return (window.location.href = "../index.html");
        loadReviews();
      });

      logoutBtn.addEventListener("click", () => {
        signOut(auth).then(() => (window.location.href = "../index.html"));
      });

      async function loadReviews() {
        reviewsContainer.innerHTML = `<p class="loading-text">Loading reviews...</p>`;
        try {
          const reviewsRef = collection(db, "reviews");
          const q = query(reviewsRef, orderBy("createdAt", "desc"));
          const snapshot = await getDocs(q);

          if (snapshot.empty) {
            reviewsContainer.innerHTML = `<p class="no-reviews">No reviews submitted yet.</p>`;
            return;
          }

          reviewsContainer.innerHTML = "";
          snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const card = document.createElement("div");
            card.classList.add("review-card");

            let dateStr = "Unknown date";
            if (data.createdAt?.toDate) {
              const d = data.createdAt.toDate();
              dateStr = `${d.toLocaleDateString()} — ${d.toLocaleTimeString()}`;
            }

            card.innerHTML = `
          <div class="review-overlay"></div>
          <p class="review-date">📅 ${dateStr}</p>
          <p class="review-text">${data.text}</p>
          <button class="delete-btn" data-id="${docSnap.id}">Delete Review</button>
        `;
            reviewsContainer.appendChild(card);
          });

          attachDeleteEvents();
        } catch (err) {
          console.error(err);
          reviewsContainer.innerHTML = `<p class="error-text">Failed to load reviews.</p>`;
        }
      }

      function attachDeleteEvents() {
        document.querySelectorAll(".delete-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = btn.dataset.id;
            if (!confirm("Are you sure you want to delete this review?"))
              return;

            try {
              await deleteDoc(doc(db, "reviews", id));
              loadReviews();
            } catch (err) {
              console.error(err);
              alert("Could not delete review.");
            }
          });
        });
      }
    </script>
  </body>
</html>
