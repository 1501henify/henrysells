<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>

    <link rel="stylesheet" href="./css/login.css" />

    <link rel="icon" href="../assets/img/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../assets/img/apple-touch-icon.png"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Righteous&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="login-wrapper">
      <form class="login-card" id="adminLoginForm">
        <h2 class="title">Admin Access</h2>
        <p class="subtitle">Restricted Area — Authorized Personnel Only</p>

        <div class="input-group">
          <label for="admin-email">Email</label>
          <input
            type="email"
            id="admin-email"
            placeholder="Enter admin email"
            autocomplete="off"
            required
          />
        </div>

        <div class="input-group">
          <label for="admin-password">Password</label>
          <input
            type="password"
            id="admin-password"
            placeholder="Enter password"
            required
          />
        </div>

        <div id="errorMessage" class="error"></div>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>

    <!-- Firebase Config -->
    <script type="module">
      import { app, auth } from "../firebase/firebaseConfig.js";
      import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

      const form = document.getElementById("adminLoginForm");
      const errorBox = document.getElementById("errorMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorBox.style.display = "none";

        const email = document.getElementById("admin-email").value.trim();
        const password = document.getElementById("admin-password").value.trim();

        try {
          // 🔐 Firebase Login
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password
          );

          // Logged in successfully
          const user = userCredential.user;

          alert("Welcome Admin");

          // Store admin session
          sessionStorage.setItem("adminAuth", "true");

          // Redirect to dashboard
          window.location.href = "./html/dashboard.html";
        } catch (err) {
          console.error(err);

          errorBox.style.display = "block";
          errorBox.textContent = "Invalid email or password. Please try again.";

          form.classList.remove("shake");
          void form.offsetWidth;
          form.classList.add("shake");
        }
      });
    </script>
  </body>
</html>
